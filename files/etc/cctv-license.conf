# /etc/cctv-license.conf — managed by nvrd-core finalize_setup. Do NOT edit by hand;
# re-run the wizard or use the resync-entitlement admin endpoint instead.
# BASE_URL is the preferred key; SERVER_URL is the legacy alias and is
# still honoured by readers. Value MUST be the bare base URL (e.g.
# https://vuon.in) with NO /api/telemetry suffix — the daemon appends
# the endpoint path itself.
#
# This stub ships pre-baked by the imagebuilder so readers (telemetry,
# license_check.py, mqtt mint, etc.) find a parseable file from first
# boot instead of erroring with "no such file or directory" until the
# operator completes setup. DEVICE_ID + TOKEN are populated atomically
# by finalize_setup once cloud link-device succeeds.
BASE_URL=https://vuon.in
